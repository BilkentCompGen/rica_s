services:
  rica_s_id_blast:
    container_name: rica_s_id_blast

    entrypoint:
      - /bin/bash

    hostname: rica_s_id_blast

    image: alkanlab/rica_s_id_blast:v1.2

    ipc: private

    logging:
      driver: json-file
      options: {}

    networks:
      - rica_s_net

    stdin_open: true

    tty: true

    volumes:
      - /opt/rica_s:/opt/rica_s

