services:
  rica_s_ui_web:
    container_name: rica_s_ui_web

    hostname: rica_s_ui_web

    image: alkanlab/rica_s_ui_web:v1.1

    ipc: private

    logging:
      driver: json-file
      options: {}

    networks:
      rica_s_net:
        ipv4_address: 172.20.0.250 # Assign a static IP address within the subnet

    ports:
      - 5000:5000/tcp

    stdin_open: true

    tty: true

    volumes:
      - /opt/rica_s:/opt/rica_s

    environment:
      - PATH=/usr/local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - PYTHON_VERSION=3.14.0
      - PYTHON_SHA256=2299dae542d395ce3883aca00d3c910307cd68e0b2f7336098c8e7b7eee9f3e9

    build:
      context: .
      dockerfile_inline: |
        FROM alkanlab/rica_s_ui_web:v1.1
        WORKDIR /opt/rica_s/tools/rica_s_ui_web
        COPY . .
        RUN python -m pip install flask docker pyaml
        RUN apt update && apt install -y nano less git wget samtools seqtk seqkit
# ENTRYPOINT [ "/bin/bash", "/rica_s/tools/rica_s_ui_web/run.sh" ]